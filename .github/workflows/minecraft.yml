name: Servidor Minecraft 24/7

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

concurrency:
  group: servidor-minecraft
  cancel-in-progress: true

jobs:
  iniciar_servidor:
    runs-on: ubuntu-latest
    steps:
      - name: Instalar Rclone (Conexión a Drive)
        run: |
          curl https://rclone.org/install.sh | sudo bash
          mkdir -p ~/.config/rclone
          cat << 'EOF' > ~/.config/rclone/rclone.conf
          ${{ secrets.RCLONE_CONF }}
          EOF

      - name: Descargar el mundo (MÉTODO ULTRA RÁPIDO)
        run: |
          rclone copy gdrive:ZerdolandIII.tar.gz ./ || true
          
          if [ -f "ZerdolandIII.tar.gz" ]; then
            echo "¡Archivo comprimido encontrado! Descomprimiendo a la velocidad de la luz..."
            tar -xzf ZerdolandIII.tar.gz
            rm ZerdolandIII.tar.gz
          else
            echo "Descargando la carpeta a velocidad segura para que Google no nos corte la conexión..."
            # Bajamos las descargas simultáneas a 8 para evitar errores de corrupción
            rclone copy gdrive:ZerdolandIII ./servidor --transfers 8
          fi

      - name: Instalar y configurar Playit
        run: |
          curl -SsL https://playit-cloud.github.io/ppa/key.gpg | gpg --dearmor | sudo tee /etc/apt/trusted.gpg.d/playit.gpg >/dev/null
          echo "deb [signed-by=/etc/apt/trusted.gpg.d/playit.gpg] https://playit-cloud.github.io/ppa/data ./" | sudo tee /etc/apt/sources.list.d/playit-cloud.list
          sudo apt update
          sudo apt install playit
          mkdir -p /etc/playit
          
          echo 'secret_key = "d45e1d084dc1ca477f975cb5ae86765adce450bdae4b303a8d3bc06a22d47164"' | sudo tee /etc/playit/playit.toml

      - name: Preparar Java (Versión 21)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Arrancar Playit y el Servidor
        run: |
          sudo playit &
          cd servidor
          echo "eula=true" > eula.txt
          chmod +x run.sh
          ./run.sh

      - name: Guardar todo en Drive (COMPRIMIDO)
        if: always()
        run: |
          echo "Empaquetando el servidor en un solo archivo para los próximos arranques..."
          tar -czf ZerdolandIII.tar.gz servidor
          echo "Subiendo el paquete a Google Drive..."
          rclone copy ZerdolandIII.tar.gz gdrive:
