name: Servidor Minecraft 24/7

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

concurrency:
  group: servidor-minecraft
  cancel-in-progress: true

jobs:
  iniciar_servidor:
    runs-on: ubuntu-latest
    steps:
      - name: Preparar Java (JAVA 21)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Instalar Rclone (Conexión a Drive)
        run: |
          curl https://rclone.org/install.sh | sudo bash
          mkdir -p ~/.config/rclone
          cat << 'EOF' > ~/.config/rclone/rclone.conf
          ${{ secrets.RCLONE_CONF }}
          EOF

      - name: Descargar el mundo y llave
        run: |
          rclone copy gdrive:ZerdolandIII.tar.gz ./ || true
          rclone copy gdrive:playit.toml ./ || true
          
          if [ -f "ZerdolandIII.tar.gz" ]; then
            tar -xzf ZerdolandIII.tar.gz
            rm ZerdolandIII.tar.gz
          else
            rclone copy gdrive:ZerdolandIII ./servidor --transfers 8
          fi

      - name: Instalar y configurar Playit
        run: |
          curl -SsL https://playit-cloud.github.io/ppa/key.gpg | gpg --dearmor | sudo tee /etc/apt/trusted.gpg.d/playit.gpg >/dev/null
          echo "deb [signed-by=/etc/apt/trusted.gpg.d/playit.gpg] https://playit-cloud.github.io/ppa/data ./" | sudo tee /etc/apt/sources.list.d/playit-cloud.list
          sudo apt update
          sudo apt install playit
          sudo mkdir -p /etc/playit
          
          if [ -f "playit.toml" ]; then
            sudo cp playit.toml /etc/playit/playit.toml
          fi

      - name: Arrancar Playit y Extraer IP (MODO PANTALLA PRINCIPAL)
        run: |
          sudo playit > playit.log 2>&1 &
          sleep 20
          
          LINK_CLAIM=$(grep -oE 'https://playit.gg/claim/[a-zA-Z0-9]+' playit.log | head -n 1 || true)
          IP_TEXTO=$(grep -oE '[a-zA-Z0-9-]+\.(gl\.joinmc\.link|auto\.playit\.gg)' playit.log | head -n 1 || true)
          IP_NUMEROS=$(grep -oE '[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+:[0-9]+' playit.log | grep -v "127.0.0.1" | head -n 1 || true)

          # ESTO SACA LA IP FUERA DE LA CAJA NEGRA
          echo "### 🚀 CONEXIÓN DE ZERDOLAND III" >> $GITHUB_STEP_SUMMARY
          if [ -n "$LINK_CLAIM" ]; then
            echo "**⚠️ Requiere activación:** [Haz clic aquí para vincular Playit]($LINK_CLAIM)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- **IP de letras:** \`$IP_TEXTO\`" >> $GITHUB_STEP_SUMMARY
          echo "- **IP de números:** \`$IP_NUMEROS\`" >> $GITHUB_STEP_SUMMARY

      - name: Arrancar Servidor de Minecraft
        run: |
          cd servidor
          echo "eula=true" > eula.txt
          chmod +x run.sh
          ./run.sh

      - name: Guardar todo en Drive
        if: always()
        run: |
          tar -czf ZerdolandIII.tar.gz servidor
          rclone copy ZerdolandIII.tar.gz gdrive:
          sudo cp /etc/playit/playit.toml ./playit.toml || true
          sudo chmod 777 ./playit.toml || true
          
          if [ -f "./playit.toml" ]; then
            rclone copy ./playit.toml gdrive:
          fi
