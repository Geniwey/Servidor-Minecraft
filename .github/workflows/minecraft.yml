name: Servidor Minecraft 24/7

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

concurrency:
  group: servidor-minecraft
  cancel-in-progress: true

jobs:
  iniciar_servidor:
    runs-on: ubuntu-latest
    steps:
      - name: Preparar Java (JAVA 21)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Instalar Rclone (Conexión a Drive)
        run: |
          curl https://rclone.org/install.sh | sudo bash
          mkdir -p ~/.config/rclone
          cat << 'EOF' > ~/.config/rclone/rclone.conf
          ${{ secrets.RCLONE_CONF }}
          EOF

      - name: Descargar el mundo y llave
        run: |
          rclone copy gdrive:ZerdolandIII.tar.gz ./ || true
          rclone copy gdrive:playit.toml ./ || true
          
          if [ -f "ZerdolandIII.tar.gz" ]; then
            echo "¡Mundo comprimido encontrado! Descomprimiendo en segundos..."
            tar -xzf ZerdolandIII.tar.gz
            rm ZerdolandIII.tar.gz
          else
            echo "Descargando la carpeta normal..."
            rclone copy gdrive:ZerdolandIII ./servidor --transfers 8
          fi

      - name: Instalar y configurar Playit
        run: |
          curl -SsL https://playit-cloud.github.io/ppa/key.gpg | gpg --dearmor | sudo tee /etc/apt/trusted.gpg.d/playit.gpg >/dev/null
          echo "deb [signed-by=/etc/apt/trusted.gpg.d/playit.gpg] https://playit-cloud.github.io/ppa/data ./" | sudo tee /etc/apt/sources.list.d/playit-cloud.list
          sudo apt update
          sudo apt install playit
          sudo mkdir -p /etc/playit
          
          if [ -f "playit.toml" ]; then
            echo "Cargando tu llave guardada de Playit..."
            sudo cp playit.toml /etc/playit/playit.toml
          fi

      - name: Arrancar Playit y Servidor (MODO RADAR AUTOMÁTICO)
        run: |
          # Arrancamos Playit escondido
          sudo playit > playit.log 2>&1 &
          
          echo "🤖 Escaneando los servidores de Playit en busca de tu IP..."
          # Esperamos 20 segundos mágicos para que la conexión se establezca
          sleep 20
          
          # El escáner extrae los datos directamente del log para que no tengas que buscar
          LINK_CLAIM=$(grep -oE 'https://playit.gg/claim/[a-zA-Z0-9]+' playit.log | head -n 1 || true)
          IP_TEXTO=$(grep -oE '[a-zA-Z0-9-]+\.(gl\.joinmc\.link|auto\.playit\.gg)' playit.log | head -n 1 || true)
          IP_NUMEROS=$(grep -oE '[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+:[0-9]+' playit.log | grep -v "127.0.0.1" | head -n 1 || true)

          echo "=================================================================="
          echo "                   🚀 CARTEL VIP DE CONEXIÓN 🚀                   "
          echo "=================================================================="
          if [ -n "$LINK_CLAIM" ]; then
            echo "⚠️ PLAYIT ESTÁ ESPERANDO TU CONFIRMACIÓN:"
            echo "Haz clic en este link para activar: $LINK_CLAIM"
            echo "------------------------------------------------------------------"
          fi
          
          if [ -n "$IP_TEXTO" ] || [ -n "$IP_NUMEROS" ]; then
            echo "✅ ¡TODO LISTO! Copia esto y pégalo en tu Minecraft:"
            [ -n "$IP_TEXTO" ] && echo "👉 Tu IP principal: $IP_TEXTO"
            [ -n "$IP_NUMEROS" ] && echo "👉 Tu IP numérica: $IP_NUMEROS"
          else
            echo "⏳ Todavía conectando... Si sale vacío, revisa la web de Playit."
          fi
          echo "=================================================================="
          
          # Arrancamos el servidor de Minecraft
          cd servidor
          echo "eula=true" > eula.txt
          chmod +x run.sh
          ./run.sh

      - name: Guardar todo en Drive (Mundo + Llave de Playit)
        if: always()
        run: |
          echo "Empaquetando el servidor..."
          tar -czf ZerdolandIII.tar.gz servidor
          rclone copy ZerdolandIII.tar.gz gdrive:
          
          echo "Guardando tu llave de Playit..."
          sudo cp /etc/playit/playit.toml ./playit.toml || true
          sudo chmod 777 ./playit.toml || true
          
          if [ -f "./playit.toml" ]; then
            rclone copy ./playit.toml gdrive:
          fi
