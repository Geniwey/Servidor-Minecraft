name: Servidor Minecraft 24/7

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

concurrency:
  group: servidor-minecraft
  cancel-in-progress: true

jobs:
  iniciar_servidor:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - name: Preparar Java (JAVA 21)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Instalar Rclone (Conexión a Drive)
        run: |
          curl https://rclone.org/install.sh | sudo bash
          mkdir -p ~/.config/rclone
          cat << 'EOF' > ~/.config/rclone/rclone.conf
          ${{ secrets.RCLONE_CONF }}
          EOF

      - name: Descargar el mundo y llave Playit
        run: |
          # 1. Crear la ruta normal del usuario SIN SUDO
          mkdir -p ~/.config/playit
          
          # 2. Descargar directo a la carpeta de playit
          rclone copy gdrive:playit.toml ~/.config/playit/ || true
          
          # 3. Descargar mundo
          rclone copy gdrive:ZerdolandIII.tar.gz ./ || true
          if [ -f "ZerdolandIII.tar.gz" ]; then
            tar -xzf ZerdolandIII.tar.gz
            rm ZerdolandIII.tar.gz
          else
            rclone copy gdrive:ZerdolandIII ./servidor --transfers 8 || true
          fi

      - name: Instalar Playit
        run: |
          curl -SsL https://playit-cloud.github.io/ppa/key.gpg | gpg --dearmor | sudo tee /etc/apt/trusted.gpg.d/playit.gpg >/dev/null
          echo "deb [signed-by=/etc/apt/trusted.gpg.d/playit.gpg] https://playit-cloud.github.io/ppa/data ./" | sudo tee /etc/apt/sources.list.d/playit-cloud.list
          sudo apt update
          sudo apt install playit

      - name: Arrancar Playit y Servidor
        run: |
          # ARRANCAMOS PLAYIT COMO USUARIO NORMAL (SIN SUDO)
          playit > playit.log 2>&1 &
          
          (
            LLAVE_GUARDADA=false
            while true; do
              # Verificar si el archivo ya tiene la contraseña secreta
              if grep -q "secret" ~/.config/playit/playit.toml 2>/dev/null; then
                 ESTADO="VINCULADO"
              else
                 ESTADO="FALTA"
              fi
              
              LINK=$(grep -m 1 -oE 'https://playit.gg/claim/[a-zA-Z0-9-]+' playit.log || true)
              IP=$(grep -m 1 -oE '[a-zA-Z0-9-]+\.(gl\.joinmc\.link|auto\.playit\.gg)' playit.log || true)
              
              echo ""
              echo "🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴"
              if [ "$ESTADO" = "VINCULADO" ]; then
                if [ -n "$IP" ]; then
                  echo "✅ SERVIDOR ACTIVO. TU IP: $IP"
                else
                  echo "✅ AGENTE VINCULADO CON ÉXITO."
                fi
                
                # GUARDAR EN DRIVE (sin problemas de permisos)
                if [ "$LLAVE_GUARDADA" = false ]; then
                  echo "💾 Guardando llave vinculada en Drive..."
                  cp ~/.config/playit/playit.toml ./playit.toml
                  if rclone copy ./playit.toml gdrive: ; then
                    echo "✅ ¡LLAVE GUARDADA DEFINITIVAMENTE!"
                    LLAVE_GUARDADA=true
                  fi
                else
                  echo "💚 Llave asegurada en tu Drive."
                fi
              elif [ -n "$LINK" ]; then
                echo "⚠️ FALTA VINCULAR PLAYIT. CLICA AQUÍ YA: $LINK"
              else
                echo "⏳ Iniciando túnel..."
              fi
              echo "🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴"
              echo ""
              sleep 20
            done
          ) &
          
          cd servidor
          echo "eula=true" > eula.txt
          chmod +x run.sh
          ./run.sh

      - name: Guardar mundo y seguro final
        if: always()
        run: |
          echo "Empaquetando servidor..."
          tar -czf ZerdolandIII.tar.gz servidor
          rclone copy ZerdolandIII.tar.gz gdrive: || true
          
          # Seguro final sin sudo
          if test -f ~/.config/playit/playit.toml; then
            cp ~/.config/playit/playit.toml ./playit.toml
            rclone copy ./playit.toml gdrive: || true
          fi
