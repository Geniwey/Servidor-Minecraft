name: Servidor Minecraft 24/7

on:
  workflow_dispatch: # Permite el botón manual
  schedule:
    - cron: '0 */5 * * *' # Auto-arranque cada 5 horas para evitar el corte brusco de las 6h

jobs:
  iniciar_servidor:
    runs-on: ubuntu-latest
    steps:
      - name: Instalar Rclone (Conexión a Drive)
        run: |
          curl https://rclone.org/install.sh | sudo bash
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONF }}" > ~/.config/rclone/rclone.conf

      - name: Descargar el mundo desde Google Drive
        run: |
          rclone copy gdrive:MinecraftServer ./servidor

      - name: Instalar y configurar Playit
        run: |
          curl -SsL https://playit-cloud.github.io/ppa/key.gpg | gpg --dearmor | sudo tee /etc/apt/trusted.gpg.d/playit.gpg >/dev/null
          echo "deb [signed-by=/etc/apt/trusted.gpg.d/playit.gpg] https://playit-cloud.github.io/ppa/data ./" | sudo tee /etc/apt/sources.list.d/playit-cloud.list
          sudo apt update
          sudo apt install playit
          mkdir -p /etc/playit
          echo "secret_key = \"${{ secrets.PLAYIT_SECRET }}\"" | sudo tee /etc/playit/playit.toml

      - name: Preparar Java (Versión 21)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Arrancar Playit y el Servidor
        run: |
          playit &
          cd servidor
          echo "eula=true" > eula.txt
          java -Xmx6G -Xms6G -jar server.jar nogui

      - name: Guardar todo en Drive al apagar
        if: always()
        run: |
          rclone sync ./servidor gdrive:MinecraftServer
